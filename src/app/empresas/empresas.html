<div class="flex flex-col gap-2">
  <div class="bg-indigo-600 px-4 p-2 text-white font-semibold">
    <h1>Empresas</h1>
  </div>

  <div class="p-8 flex">
    <table class="w-full h-full">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>NIT</th>
          <th>Ciudad</th>
          <th>Sector</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Empresa Ejemplo S.A.</td>
          <td>900.123.456-7</td>
          <td>Bogotád</td>
          <td>Tecnología</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="max-w-120 mx-auto w-full">
    <form action="/empresas" class="flex flex-col gap-2">
      <input type="hidden" id="id" name="id" />

      <div class="flex flex-col gap-2">
        <label for="nombre">Nombre de la Empresa:</label>
        <input type="text" id="nombre" name="nombre" required />
      </div>

      <div class="flex flex-col gap-2">
        <label for="nit">NIT:</label>
        <input type="text" id="nit" name="nit" required />
      </div>

      <div class="flex flex-col gap-2">
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" name="ciudad" required />
      </div>

      <div class="flex flex-col gap-2">
        <label for="sector">Sector:</label>
        <input type="text" id="sector" name="sector" required />
      </div>

      <button type="submit" class="bg-indigo-500 text-white font-semibold p-2 rounded">
        Guardar Empresa
      </button>
    </form>
  </div>
</div>
